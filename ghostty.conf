# ============================================
# Cyberpunk Cyan Theme for Ghostty
# Complete configuration with colors and settings
# ============================================

# Theme Colors
background = #0a0a0f
foreground = #e0f7ff
cursor-color = #00FFFF
selection-background = #00FFFF
selection-foreground = #0a0a0f

# Color Palette
palette = 0=#1a1a24
palette = 1=#ff2a6d
palette = 2=#39ff14
palette = 3=#ffd700
palette = 4=#00FFFF
palette = 5=#ff00ff
palette = 6=#00CCCC
palette = 7=#c0c5ce
palette = 8=#4a4a5c
palette = 9=#ff5c8d
palette = 10=#5fff44
palette = 11=#ffe44d
palette = 12=#66FFFF
palette = 13=#ff66ff
palette = 14=#33dddd
palette = 15=#ffffff

# ============================================
# Font Configuration
# ============================================
font-family = "JetBrainsMono Nerd Font"
font-style = Regular
font-size = 9

# ============================================
# Window Settings
# ============================================
window-theme = ghostty
window-padding-x = 14
window-padding-y = 14
confirm-close-surface = false
resize-overlay = never
gtk-toolbar-style = flat

# ============================================
# Cursor Styling
# ============================================
cursor-style = "block"
cursor-style-blink = false

# Shell Integration + SSH Session Terminfo
# (all shell integration options must be passed together)
shell-integration-features = no-cursor,ssh-env

# ============================================
# Keyboard Bindings
# ============================================
keybind = shift+insert=paste_from_clipboard
keybind = control+insert=copy_to_clipboard
keybind = super+control+shift+alt+arrow_down=resize_split:down,100
keybind = super+control+shift+alt+arrow_up=resize_split:up,100
keybind = super+control+shift+alt+arrow_left=resize_split:left,100
keybind = super+control+shift+alt+arrow_right=resize_split:right,100

# ============================================
# Mouse & Performance
# ============================================
# Slowdown mouse scrolling
mouse-scroll-multiplier = 0.95

# Fix general slowness on Hyprland
# https://github.com/ghostty-org/ghostty/discussions/3224
async-backend = epoll

# ============================================
# Transparency Effect
# (blur provided by Hyprland compositor)
# ============================================
background-opacity = 0.85
