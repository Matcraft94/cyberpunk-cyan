$activeBorderColor = rgb(00FFFF)

general {
    col.active_border = $activeBorderColor
}

group {
    col.border_active = $activeBorderColor
}

# ============================================
# CYBERPUNK 2077 SCREEN SHADER
# ============================================
# ⚠️ WARNING: Shader may cause black screen if there are
# compilation errors or GPU/driver incompatibility.
#
# INCLUDED EFFECTS:
# - Animated scanlines (horizontal CRT lines)
# - Chromatic aberration (RGB separation on edges)
# - Vignette (darkening at screen edges)
# - Cyan cyberpunk tint
#
# REQUIREMENTS:
# - GLSL ES 3.00+ (Hyprland 0.54.2+)
# - GPU compatible with modern shaders
#
# PERFORMANCE:
# - Forces full screen redraw every frame
# - May significantly increase GPU usage
# - Monitor with 'hyprctl getoption decoration:screen_shader'
#
# TO ENABLE: Uncomment the 2 lines below and run 'hyprctl reload'
# decoration {
#     screen_shader = ~/.config/hypr/shaders/cyberpunk2077.frag
# }
#
# TO DISABLE: Comment the lines and run 'hyprctl reload'
# If screen goes black: Switch to another TTY (Ctrl+Alt+F2),
# remove the file or comment the line, then restart Hyprland.
# ============================================
