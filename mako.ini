# 🎨 Cyberpunk Cyan Theme for Mako - Compact
include=~/.local/share/omarchy/default/mako/core.ini

# ============================================
# ESTILO BASE CYBERPUNK - COMPACTO
# ============================================

# Colores base
background-color=#0a0a0f
text-color=#e0f7ff
border-color=#00FFFF

# Dimensiones reducidas (3/4 del tamaño original)
width=315
height=135
border-size=2
border-radius=10
padding=14
margin=15

# Fuente más pequeña estilo terminal
font=JetBrainsMono Nerd Font 9

# Iconos
icons=1
max-icon-size=48
icon-path=/usr/share/icons/hicolor:/usr/share/icons/Adwaita

# Comportamiento
default-timeout=6000
ignore-timeout=0

# ============================================
# ACCIONES
# ============================================
on-button-left=dismiss
on-button-middle=none
on-button-right=dismiss-all

# ============================================
# AGRUPAMIENTO
# ============================================
group-by=summary

# ============================================
# URGENCIA BAJA - Verde Cyberpunk
# ============================================
[urgency=low]
border-color=#39ff14
background-color=#0d120d
default-timeout=4000

# ============================================
# URGENCIA NORMAL - Cyan Neon
# ============================================
[urgency=normal]
border-color=#00FFFF
background-color=#0a0a0f
default-timeout=6000

# ============================================
# URGENCIA CRÍTICA - Rojo Alerta
# ============================================
[urgency=critical]
border-color=#ff2a6d
background-color=#15050a
default-timeout=0

# ============================================
# CATEGORÍAS ESPECIALES
# ============================================

# Mensajes instantáneos - Magenta
[category=im.received]
border-color=#ff00ff
background-color=#0f0a12

# Correos - Amarillo/Dorado
[category=email.arrived]
border-color=#ffd700
background-color=#12100a

# Sistema - Cyan brillante
[category=system]
border-color=#66ffff
background-color=#0a0f12

# Errores - Rojo intenso
[category=error]
border-color=#ff2a6d
background-color=#1a0508
default-timeout=0
